title: PXO Pulse
url: "https://pxopulse.com" # the base hostname & protocol for your site
logo: /assets/logo180.webp
description: "PXO Pulse é a agenda de eventos do Porto Santo, com concertos, workshops, desporto, cultura e atividades para residentes e visitantes."
lang: pt-PT
locale: pt_PT
data_dir: _data

page_gen:
  - name: page_slug
    template: event
    title: name
    dir: events
    data: events
    # extension: false Url helper still generates with .html
    filter_condition: "require 'date'; end_date = record['end_date'].to_s.strip; end_date = record['start_date'] if end_date.empty?; Date.strptime(end_date.split(' ')[0], '%d/%m/%Y') >= (Date.new(Date.today.year, Date.today.month, 1) << 1)"

tailwindcss:
  css_path: ./events_listing/_tailwind.css

# `twitter.username` feeds Twitter Card metadata,
# while `social.links` feeds JSON-LD `sameAs` links for `jekyll-seo-tag`.
# They look redundant, but they are consumed by different outputs.
twitter:
  username: pxopulse87799

social:
  links:
    - https://pxopulse.com
    - https://www.instagram.com/pxopulse
    - https://x.com/pxopulse87799
