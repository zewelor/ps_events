name: Docker Checks

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'events.csv'
      - 'images/**'
      - 'events_listing/**'
  pull_request:
    paths-ignore:
      - 'events.csv'
      - 'images/**'
      - 'events_listing/**'

env:
  COMPOSE_DOCKER_CLI_BUILD: 1
  # It counts some attestation etc packages, each commit gives 3 pckages
  OLD_VERSIONS_TO_KEEP: 75 # 25 commits
  DOCKER_BUILD_CHECKS_ANNOTATIONS: false

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      production: ${{ steps.detect.outputs.production }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect production deployment changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          ZERO_SHA: '0000000000000000000000000000000000000000'
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "production=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags origin "${BASE_REF}"
            changed_files="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          elif [ "${BEFORE_SHA}" = "${ZERO_SHA}" ]; then
            changed_files="$(jq -r '[.commits[]? | (.added[]?, .modified[]?, .removed[]?)] | unique | .[]' "$GITHUB_EVENT_PATH")"
          else
            changed_files="$(gh api "repos/${REPOSITORY}/compare/${BEFORE_SHA}...${TARGET_SHA}" --jq '.files[].filename')"
          fi

          production=false
          while IFS= read -r path; do
            case "$path" in
              Dockerfile|Gemfile|Gemfile.lock|bin/server.rb|lib/server/*|.github/workflows/docker_checks.yml)
                production=true
                break
                ;;
            esac
          done <<EOF
          ${changed_files}
          EOF

          echo "production=${production}" >> "$GITHUB_OUTPUT"

  tests:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v6

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx_test
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: true
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
          target: ci
          # Used by docker-compose.ci and Jekyll workflows.
          tags: ghcr.io/${{ github.repository }}:ci

      - name: Run Rubocop
        run: |
          docker compose run --rm app bundle exec rubocop

      - name: Run Tests
        run: |
          docker compose run --rm app bundle exec rake test

      - name: Jekyll doctor
        run: |
          docker compose run --rm -e JEKYLL_ENV=production -e COMMIT_SHA=${{ github.sha }} -e BACKEND_HOST=http://sinatra:4567 app bundle exec jekyll doctor --source /app/events_listing

  push_production:
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.production == 'true'
      )
    needs:
      - changes
      - tests
    runs-on: ubuntu-latest
    concurrency:
      group: production-docker
      cancel-in-progress: true
    environment: production
    permissions:
      contents: read
      deployments: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # full length sha
            type=sha,format=long,prefix=
          flavor: |
            latest=true

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          target: live
          platforms: linux/amd64
          cache-from: |
            type=gha,scope=live
            type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=live
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_CODE_VERSION=${{ github.sha }}

      - name: Delete old images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: "container"
          min-versions-to-keep: ${{ env.OLD_VERSIONS_TO_KEEP }}

      - name: Deploy via webhook
        env:
          deploy_url: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error "$deploy_url"
