name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'events.csv'
      - '.github/workflows/jekyll_site.yml'
      - 'events_listing/**'
  workflow_dispatch:
  schedule:
    - cron: '0 5 */1 * *'
  workflow_run:
    workflows: ["Regenerate events"]
    branches: [main]
    types:
      - completed

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

# Allow only one Pages deployment workflow at a time.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve checkout ref
        id: resolve_checkout
        env:
          DEFAULT_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET_SHA: ${{ github.sha }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          checkout_ref="${DEFAULT_REF}"

          if [ "${EVENT_NAME}" = "push" ]; then
            checkout_ref="${TARGET_SHA}"
          elif [ "${EVENT_NAME}" = "workflow_run" ]; then
            checkout_ref="refs/heads/${WORKFLOW_BRANCH:-${DEFAULT_BRANCH}}"
          fi

          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_checkout.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Detect Docker Checks dependency
        id: detect_dependency
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          ZERO_SHA: 0000000000000000000000000000000000000000
        run: |
          should_wait=false

          if [ "${EVENT_NAME}" = "push" ]; then
            if [ "${BEFORE_SHA}" = "${ZERO_SHA}" ]; then
              changed_files="$(git ls-tree -r --name-only HEAD)"
            else
              changed_files="$(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}")"
            fi

            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                events_listing/*)
                  ;;
                *)
                  should_wait=true
                  break
                  ;;
              esac
            done <<EOF
          ${changed_files}
          EOF
          fi

          echo "should_wait=${should_wait}" >> "$GITHUB_OUTPUT"

      - name: Capture build SHA
        id: build_sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for Docker Checks tests
        if: ${{ github.event_name == 'push' && steps.detect_dependency.outputs.should_wait == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          MAX_WAIT=600  # 10 minutes max
          POLL_INTERVAL=15

          for i in $(seq 1 $((MAX_WAIT / POLL_INTERVAL))); do
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/docker_checks.yml/runs" \
              --jq ".workflow_runs[] | select(.head_sha == \"${TARGET_SHA}\" and .event == \"push\") | .id" \
              | head -1)

            if [ -z "$RUN_ID" ]; then
              echo "No Docker Checks run found yet for commit ${TARGET_SHA}. Waiting ${POLL_INTERVAL}s... (attempt $i)"
              sleep $POLL_INTERVAL
              continue
            fi

            TEST_STATE=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
              --jq '.jobs[] | select(.name == "tests") | [.status, (.conclusion // "")] | @tsv' \
              | head -1)

            IFS=$'\t' read -r TEST_STATUS TEST_CONCLUSION <<<"$TEST_STATE"

            if [ "$TEST_STATUS" = "completed" ]; then
              if [ "$TEST_CONCLUSION" != "success" ]; then
                echo "Docker Checks tests failed for commit ${TARGET_SHA}. Aborting deploy."
                exit 1
              fi

              echo "Docker Checks tests passed for commit ${TARGET_SHA}. Proceeding with Jekyll build."
              exit 0
            fi

            echo "Docker Checks tests status is '${TEST_STATUS:-pending}' for run ${RUN_ID}. Waiting ${POLL_INTERVAL}s... (attempt $i)"
            sleep $POLL_INTERVAL
          done

          echo "Timeout waiting for Docker Checks tests for commit ${TARGET_SHA}. Aborting deploy."
          exit 1

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Jekyll site
        run: docker compose run -e JEKYLL_ENV=production -e BACKEND_HOST=${{ secrets.BACKEND_HOST }} -e COMMIT_SHA=${{ steps.build_sha.outputs.value }} app bundle exec jekyll build --source /app/events_listing --destination /app/_site
        env:
          COMPOSE_FILE: docker-compose.ci.yml
          COMMIT_SHA: ${{ steps.build_sha.outputs.value }}

      # Breaks some CSS styles
      - name: Minify HTML, CSS, and JS
        uses: docker://devatherock/minify-js:3.1.0
        with:
          directory: '_site'
          add_suffix: false
          exclusions: |-        # Optional
            _site/assets/css/styles.css

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name=pxopulse # Directory of output assets
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
