<div id="pwa-install-banner" class="fixed inset-x-0 bottom-0 z-50 hidden md:hidden">
  <div class="mx-3 mb-3 rounded-2xl bg-[var(--color-selected-filter)] text-white shadow-xl">
    <div class="flex items-start gap-3 px-4 py-3">
      <div class="min-w-0 flex-1">
        <p id="pwa-install-copy" class="text-sm font-medium leading-5">
          Instale a app para aceder mais depressa aos eventos.
        </p>
      </div>
      <div class="flex items-center gap-2">
        <button
          id="install-pwa-btn"
          type="button"
          class="rounded-lg bg-white px-3 py-2 text-sm font-semibold text-[var(--color-text-primary)] transition-colors duration-200 hover:bg-neutral-100"
        >
          Instalar
        </button>
        <button
          id="close-pwa-banner-btn"
          type="button"
          class="rounded-full p-2 text-white/80 transition-colors duration-200 hover:bg-white/10 hover:text-white"
          aria-label="Fechar aviso de instalação"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div
  id="pwa-install-help"
  class="fixed inset-0 z-50 hidden bg-black/40 px-4 py-6 md:hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="pwa-install-help-title"
>
  <div class="mx-auto mt-auto max-w-sm rounded-2xl bg-white p-5 shadow-xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 id="pwa-install-help-title" class="text-lg font-semibold text-[var(--color-text-primary)]">
          Instalar o PXO Pulse
        </h2>
        <p id="pwa-install-help-copy" class="muted-text mt-2">
          Siga estes passos no seu navegador.
        </p>
      </div>
      <button
        id="close-pwa-help-btn"
        type="button"
        class="rounded-full p-2 text-[var(--color-text-subtle)] transition-colors duration-200 hover:bg-neutral-100 hover:text-[var(--color-text-primary)]"
        aria-label="Fechar ajuda de instalação"
      >
        <span aria-hidden="true">&times;</span>
      </button>
    </div>

    <ol id="pwa-install-steps" class="mt-4 space-y-2 text-sm leading-6 text-[var(--color-text-secondary)]"></ol>
  </div>
</div>
