name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'events.csv'
      - '.github/workflows/jekyll_site.yml'
      - 'events_listing/**'
  workflow_dispatch:
  schedule:
    - cron: '0 5 */1 * *'
  workflow_run:
    workflows: ["Regenerate events"]
    branches: [main]
    types:
      - completed

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

# Allow only one Pages deployment workflow at a time.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    if: >
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      (
        github.event_name != 'push' ||
        (
          !contains(toJSON(github.event.commits), 'bin/spreadsheet_to_ical') &&
          !contains(toJSON(github.event.commits), '.github/workflows/regenerate_events.yml')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve checkout ref
        id: resolve_checkout
        env:
          DEFAULT_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET_SHA: ${{ github.sha }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          checkout_ref="${DEFAULT_REF}"

          if [ "${EVENT_NAME}" = "push" ]; then
            checkout_ref="${TARGET_SHA}"
          elif [ "${EVENT_NAME}" = "workflow_run" ]; then
            checkout_ref="refs/heads/${WORKFLOW_BRANCH:-${DEFAULT_BRANCH}}"
          fi

          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_checkout.outputs.checkout_ref }}

      - name: Capture build SHA
        id: build_sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build Jekyll site
        run: docker compose run -e JEKYLL_ENV=production -e BACKEND_HOST=${{ secrets.BACKEND_HOST }} -e COMMIT_SHA=${{ steps.build_sha.outputs.value }} app bundle exec jekyll build --source /app/events_listing --destination /app/_site
        env:
          COMPOSE_FILE: docker-compose.ci.yml
          COMMIT_SHA: ${{ steps.build_sha.outputs.value }}

      # Breaks some CSS styles
      - name: Minify HTML, CSS, and JS
        uses: docker://devatherock/minify-js:3.1.0
        with:
          directory: '_site'
          add_suffix: false
          exclusions: |-        # Optional
            _site/assets/css/styles.css

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name=pxopulse # Directory of output assets
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
